# render.yaml — Deploy to Render.com
# docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API (FastAPI) ─────────────────────────────────
  - type: web
    name: iv-sig-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # free tier → upgrade to standard for production
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false        # set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false        # set to your frontend URL, e.g. https://iv-sig-app.onrender.com
    healthCheckPath: /health

  # ── Frontend (React PWA via nginx) ───────────────────────
  - type: web
    name: iv-sig-app
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: starter
    autoDeploy: true
    envVars:
      # Render passes envVars into the Docker build as --build-arg.
      # Dockerfile.frontend has `ARG REACT_APP_API_URL` to receive it,
      # so CRA bakes this URL into the static bundle at build time.
      - key: REACT_APP_API_URL
        value: https://placeholder   # update to your API URL after first deploy
