# render.yaml — Deploy to Render.com
# docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API (FastAPI) ─────────────────────────────────
  # Free web service: sleeps after 15 min idle, ~1 min cold start.
  # Optionally keep warm with an uptime pinger hitting /health.
  - type: web
    name: iv-sig-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free             # $0 — upgrade to starter/standard for always-on production
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false        # set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false        # set to your frontend URL, e.g. https://iv-sig-app.onrender.com
    healthCheckPath: /health

  # ── Frontend (React PWA) ─────────────────────────────────
  # Static Site: $0, served from CDN, NEVER spins down, no instance-hour limit.
  # Render runs buildCommand, then serves the files in staticPublishPath.
  - type: web
    name: iv-sig-app
    runtime: static
    # Install deps and build the React app with Vite.
    buildCommand: cd frontend && npm install && npm run build
    # Vite outputs to frontend/dist (relative to repo root).
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    envVars:
      # Available at build time; Vite bakes VITE_* into the bundle.
      - key: VITE_API_URL
        value: https://iv-sig-api.onrender.com   # backend API (confirmed live)
    # SPA rewrite: send every non-file path to index.html so client-side
    # routing and page refreshes work instead of returning 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
